<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <label>Nhập a:</label>
    <input type="number" id="a"><br><br>

    <label>Nhập b:</label>
    <input type="number" id="b"><br><br>

    <button onclick="giaiPhuongTrinh()">Giải</button>

    <h3 id="result "></h3>

    <script>
        function giaiPhuongTrinh() {
            let a = parseFloat(document.getElementById("a").value);
            let b = parseFloat(document.getElementById("b").value);
            let result = document.getElementById("result ");
            if (a === 0) {
                if (b === 0) {
                    result.innerHTML = "Phương trình vô số nghiệm";
                } else {
                    result.innerHTML = "Phương trình vô nghiệm";
                }
            } else {
                let x = -b / a;
                result.innerHTML = "Nghiệm x = " + x;
            }
        }
    </script>
</body>
</html>
