<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="a" placeholder="Nhập số a">
    <button onclick="calculate()">Tính diện tích hình vuông</button>
    <p id="result"></p>
    <script>
        function calculate() {
            var a = document.getElementById("a").value;
            var dienTich = a * a;
            document.getElementById("result").innerText = "Diện tích hình vuông là: " + dienTich;
        }
    </script>
</body>
</html>
