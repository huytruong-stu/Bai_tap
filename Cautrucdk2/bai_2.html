<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" name="met" id="met" placeholder="Nhập số mét">
    <button onclick="convert()">Chuyển đổi</button>
    <p id="result"></p>
    <script>
        function convert() {
            var met = document.getElementById("met").value;
            var feet = met * 3.28084;
            document.getElementById("result").innerHTML = met + " mét = " + feet.toFixed(2) + " feet";
        }
    </script>
</body>
</html>
