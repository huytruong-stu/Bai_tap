<!DOCTYPE html>
<html>
<head>
    <title>Giải PT bậc hai</title>
</head>
<body>
    <h2>Giải phương trình bậc hai</h2>

    <input type="number" id="a" placeholder="Nhập a"><br><br>
    <input type="number" id="b" placeholder="Nhập b"><br><br>
    <input type="number" id="c" placeholder="Nhập c"><br><br>

    <button onclick="giai()">Giải</button>

    <p id="result"></p>

    <script>
        function giai() {
            let a = parseFloat(document.getElementById("a").value);
            let b = parseFloat(document.getElementById("b").value);
            let c = parseFloat(document.getElementById("c").value);
            let result = document.getElementById("result");

            if (a === 0) {
                result.innerHTML = "Không phải phương trình bậc hai";
                return;
            }

            let delta = b*b - 4*a*c;

            if (delta > 0) {
                let x1 = (-b + Math.sqrt(delta)) / (2*a);
                let x2 = (-b - Math.sqrt(delta)) / (2*a);
                result.innerHTML = `2 nghiệm: x1 = ${x1}, x2 = ${x2}`;
            } 
            else if (delta === 0) {
                let x = -b / (2*a);
                result.innerHTML = `Nghiệm kép: x = ${x}`;
            } 
            else {
                result.innerHTML = "Vô nghiệm";
            }
        }
    </script>
</body>
</html>
