<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" min="0" max="120" id="age" placeholder="Nhập tuổi của bạn"><br><br>
    <button onclick="checkAge()">Kiểm tra</button>
    <p id="result"></p>
    <script>
        function checkAge() {
            let age = parseFloat(document.getElementById("age").value);
            let result = document.getElementById("result");
            if (age < 0 || age > 120) {
                result.innerHTML = "Tuổi không hợp lệ";
            } else if (age === 0) {
                result.innerHTML = "Bạn chưa sinh ra";
            } else if (age < 18) {
                result.innerHTML = "Bạn là trẻ em";
            } else if (age < 60) {
                result.innerHTML = "Bạn là người lớn";
            } else {
                result.innerHTML = "Bạn là người cao tuổi";
            }
        }
    </script>
</body>
</html>
