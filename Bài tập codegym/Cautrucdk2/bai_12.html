<!DOCTYPE html>
<html>
<head>
    <title>Tính lãi ngân hàng</title>
</head>
<body>
    <h2>Tính lãi kép (lãi mẹ đẻ lãi con)</h2>

    <label>Số tiền ban đầu (P):</label><br>
    <input type="number" id="principal"><br><br>

    <label>Lãi suất hàng tháng (%):</label><br>
    <input type="number" id="rate"><br><br>

    <label>Số tháng (n):</label><br>
    <input type="number" id="months"><br><br>

    <button onclick="tinhLai()">Tính</button>

    <h3 id="result"></h3>

    <script>
        function tinhLai() {
            let P = parseFloat(document.getElementById("principal").value);
            let r = parseFloat(document.getElementById("rate").value) / 100;
            let n = parseInt(document.getElementById("months").value);

            if (P <= 0 || r < 0 || n <= 0) {
                document.getElementById("result").innerText = "Vui lòng nhập dữ liệu hợp lệ!";
                return;
            }

            let A = P * Math.pow((1 + r), n);

            document.getElementById("result").innerText =
                "Số tiền sau " + n + " tháng là: " + A.toFixed(2) + " VND";
        }
    </script>
</body>
</html>
