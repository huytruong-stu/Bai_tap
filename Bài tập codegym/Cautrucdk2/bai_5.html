<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" name="" id="keA" placeholder="Nhập số a">
    <input type="text" name="" id="keB" placeholder="Nhập số b">
    <button onclick="calculate()">Tính diện tích tam giác vuông</button>
    <p id="result"></p>
    <script>
        function calculate() {
            var a = parseFloat(document.getElementById("keA").value);
            var b = parseFloat(document.getElementById("keB").value);
            var area = (a * b) / 2;
            document.getElementById("result").innerText = "Diện tích tam giác vuông là: " + area;
        }
    </script>
</body>
</html>
