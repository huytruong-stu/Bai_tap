<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="a" placeholder="Nhập a">
    <input type="text" id="b" placeholder="Nhập b">
    <button onclick="calculate()">Tính diện tích hình chữ nhật</button>
    <p id="result"></p>
    <script>
        function calculate() {
            var a = document.getElementById("a").value;
            var b = document.getElementById("b").value;
            var dienTich = a * b;
            document.getElementById("result").innerText = "Diện tích hình chữ nhật là: " + dienTich;
        }
    </script>

</body>
</html>
