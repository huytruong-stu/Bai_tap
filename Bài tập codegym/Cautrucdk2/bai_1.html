<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="doC" placeholder="Nhập độ C">
    <button onclick="convert()">Convert</button>
    <p id="result"></p>
    <script>
        function convert() {
            var doC = document.getElementById("doC").value;
            var doF = (doC * 9/5) + 32;
            document.getElementById("result").innerText = doC + " độ C = " + doF + " độ F";
        }
    </script>
   
</body>
</html>
