<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const rows = 5;
const cols = 10;

for (let i = 0; i < rows; i++) {
    let line = "";
    for (let j = 0; j < cols; j++) {
        // Kiểm tra nếu là hàng đầu, hàng cuối, cột đầu, hoặc cột cuối
        if (i === 0 || i === rows - 1 || j === 0 || j === cols - 1) {
            line += "* ";
            
        } else {
            line += "  "; // Hai khoảng trắng để khớp với "* "
        }
    }
    console.log(line);
}
    </script>
</body>
</html>
