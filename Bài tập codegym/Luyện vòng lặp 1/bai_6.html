<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function drawHeart() {
    let result = "";
    // Vòng lặp cho trục y (từ trên xuống dưới)
    for (let y = 1.5; y > -1.5; y -= 0.1) {
        // Vòng lặp cho trục x (từ trái sang phải)
        for (let x = -1.5; x < 1.5; x += 0.05) {
            // Công thức toán học của hình trái tim: (x^2 + y^2 - 1)^3 - x^2 * y^3 <= 0
            const formula = Math.pow(x * x + y * y - 1, 3) - x * x * Math.pow(y, 3);
            
            if (formula <= 0) {
                result += "*";
            } else {
                result += " ";
            }
        }
        result += "\n";
    }
    console.log(result);
}
drawHeart();
    </script>
</body>
</html>
