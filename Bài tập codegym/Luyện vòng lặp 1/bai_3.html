<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = 5;
        for (let i = 1; i <= n; i++) {
        document.write("*".repeat(i) + "<br>" );
        }
        for (let i = n; i >= 1; i--) {
    document.write("*".repeat(i) + "<br>");
}
        for (let i = 1; i <= n; i++) {
    // In khoảng trắng trước, sau đó là dấu *
    document.write(" ".repeat(n - i) + "*".repeat(i) + "<br>");
        } 
for (let i = n; i >= 1; i--) {
    document.write(" ".repeat(n - i) + "*".repeat(i) + "<br>");
}
    </script>
</body>
</html>
