<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <input type="text" name="age" id="age" placeholder="Nhập số tuổi">
        <button onclick="checkAge()">Kiểm tra</button>
        <p id="result"></p>
        <script>
            function checkAge() {
                var age = parseInt(document.getElementById('age').value);
                if (age < 16) {
                    document.getElementById('result').innerText = "Bạn chưa đủ tuổi vào lớp 10.";
                } else {
                    document.getElementById('result').innerText = "Bạn đã đủ tuổi vào lớp 10.";
                }
            }
        </script>
</body>
</html>
