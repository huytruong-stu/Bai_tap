<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" name="num" id="number" placeholder="Nhập số nguyên bất kì">
    <button onclick="checkNumber()">Kiểm tra</button>
    <p id="result"></p>
    <script>
        function checkNumber() {
            let num = parseInt(document.getElementById('number').value);
            if (num < 0) {
                document.getElementById('result').innerText = "Số " + num + " nhỏ hơn 0.";
            } else if(num > 0) {
                document.getElementById('result').innerText = "Số " + num + " lớn hơn 0.";
            } else {
                document.getElementById('result').innerText = "Số " + num + " bằng 0.";
            }   
        }
    </script>
</body>
</html>
