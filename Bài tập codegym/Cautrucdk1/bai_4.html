<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" name="num1" id="number1" placeholder="Nhập số thứ nhất">
    <input type="number" name="num2" id="number2" placeholder="Nhập số thứ hai">
    <input type="number" name="num3" id="number3" placeholder="Nhập số thứ ba">
    <button onclick="findLargest()">Tìm số lớn nhất</button>
    <script>
        function findLargest() {
            var num1 = parseFloat(document.getElementById('number1').value);
            var num2 = parseFloat(document.getElementById('number2').value);
            var num3 = parseFloat(document.getElementById('number3').value);
            var largest = num1;
            if (num2 > largest) {
                largest = num2;
            } if (num3 > largest) {
                largest = num3;
            }
            alert("Số lớn nhất là: " + largest);
        }
    </script>
</body>
</html>
