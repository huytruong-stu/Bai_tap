<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function tinhGiaiThua(n) {
            if (n < 0) return "không tính được cho số âm"
            let result = 1;
            for (let i = 1; i <= n; i++) {
                result *= i;
            }
            return result;
        }
        document.write("!= ", tinhGiaiThua(prompt("Nhập ")));
        document.write("! = ", tinhGiaiThua(prompt("Nhập ")));

    </script>
</body>

</html>
