<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let value = prompt("Nhập vào đây");
        let number = [-3, 5, 3, 2, 1, 10];
        let index = -1;
        for (let i = 0; i < number.length; i++) {
            if (value == number[i]) {
                index = i;
            }
        }
        if (index > -1) {
            alert("Value:" + value + "found at" + index);
        }
        else {
            alert("Value:" + value + "Not found");
        }
    </script>
</body>
</html>
