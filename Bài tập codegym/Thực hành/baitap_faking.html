<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Magic Typing</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; }
        textarea { width: 500px; height: 100px; padding: 15px; font-size: 18px; border-radius: 8px; border: 2px solid #ccc; }
    </style>
</head>
<body>

    <textarea id="fakeInput" placeholder="Thử gõ bất kỳ thứ gì vào đây..."></textarea>

    <script>
        const fixedText = "Chúc mừng! Bạn đã rơi vào bẫy của tôi rồi nhé. Ôiii, cái đồ ngốc nghếch này hahhahahhaha!";
        let index = 0;
        const inputField = document.getElementById('fakeInput');

        inputField.onkeydown = function(e) {
            e.preventDefault();
            if (index < fixedText.length) {
                inputField.value += fixedText[index];
                index++;
            }
             if (index === fixedText.length) {
                 inputField.value = "";
                 index = 0;
            }
        };
    </script>
</body>
</html>
