<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       let num = prompt("Nhập một số:");
       let total = 0;
       let i;
       for (i = 1; i <= num; i++) {
           total += i;
           alert ("Tổng từ 1 đến " + i + " là: " + total);
       }
        
    </script>
</body>
</html>
