<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const numbers = [5, 12, 8, 20, 10, 3, 45, 7, 15, 9];
        let count = 0;

        // 2. Duyệt qua mảng và kiểm tra điều kiện
        for (let i = 0; i < numbers.length; i++) {
            if (numbers[i] >= 10) {
                count++;

            }
        }

        // 3. Hiển thị kết quả
        document.write("Mảng các số: ", numbers); 
        document.write( "<br>", "Số lượng số nguyên >= 10 là: ", count);
    </script>
</body>

</html>
