<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let str = "  Học lập trình   cùng Gemini thật thú vị  ";
        function countWords(inputString) {
            let words = inputString.trim().split(/\s+/);
            if (words[0] === "") {
                return 0;
            }
            return words.length;
        }
        let wordCount = countWords(str);
        document.write("Chuỗi gốc: '" + str + "'");
        document.write("Số từ trong chuỗi là: " + wordCount);
    </script>
</body>

</html>
