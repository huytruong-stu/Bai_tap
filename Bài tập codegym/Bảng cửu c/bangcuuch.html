<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    h1 {
        text-align: center;
        color: #ff0000;
        }
    table {
        margin:    0  auto;
        border-collapse: collapse;
        border:     2px solid rgb(253, 0, 0);
    }
    td {
        text-shadow: 2px 2px 4px #ff0000;
        text-align: center;
        color: black;
        border: 2px solid rgb(253, 0, 0);
    }
</style>
<body>
    <h1>
        Bảng cửu chương
    </h1>
    <script>
        
        let sout, i, j;
        sout = "<table border='1' width='300' cellspacing='0' cellpadding='15'>";
        debugger;
        for (i = 1; i <= 10; i++) {
            sout = sout + "<tr>";   
            for (j = 2; j <= 9; j++) {
                sout = sout + "<td>" + j + "*" + i + "=" + i * j + "</td>";
            }
            sout = sout + "</tr>";  
            // j = 1;
        }
        sout = sout + "</table>";
        document.write(sout);
    
    </script>
</body>
</html>
