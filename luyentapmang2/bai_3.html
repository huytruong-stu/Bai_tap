<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let arr = ['a', '2', 'b', '5', '8', 'z', '1', 'H', '9', '0'];
        let size = arr.length; 
        let count = 0;
        for (let i = 0; i < size; i++) {
            if (arr[i] >= '0' && arr[i] <= '9') {
                count++;
            }
        }
        document.write("Mảng gồm: [" + arr.join(", ") + "]");
        document.write("Số lượng ký tự số trong mảng là: " + count);
    </script>
</body>

</html>
