<body>
    <script>
        function tinhTongVongLap(n, k) {
    let tong = 0;
    for (let i = 1; i <= n; i++) {
        tong += i * k; // Lần lượt là 1*7, 2*7, 3*7...
    }
    return tong;
}

console.log("Tổng):", tinhTongVongLap(30, 7));
    </script>
</body>
