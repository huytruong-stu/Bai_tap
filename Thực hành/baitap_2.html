<body>
    <script>
        const input = "025468";
        const result = input.replace(/([02468])(?=[02468])/g, '$1-'); // Positive Lookahead – kiểm tra xem ngay phía sau nó có phải là một số chẵn khác hay không

        console.log(result);
    </script>
