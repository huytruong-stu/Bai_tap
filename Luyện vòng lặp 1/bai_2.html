<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function tinhGiaiThua(n) {
    if (n < 0) return "Không tính được số âm";
    let giaThua = 1;
    for (let i = 1; i <= n; i++) {
        giaThua *= i;
    }
    return giaThua;
}

console.log(tinhGiaiThua(5)); // 120
    </script>
</body>
</html>
