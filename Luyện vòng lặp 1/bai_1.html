<body>
    <script>
        function fibonacci(n) {
    let a = 0, b = 1;
    let result = [];

    for (let i = 0; i < n; i++) {
        result.push(a);
        let temp = a + b;
        a = b;
        b = temp;
    }
    
    console.log(result.join(" "));
}
    fibonacci(20); 
    </script>
</body>
