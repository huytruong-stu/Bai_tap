<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 1. Khởi tạo mảng số nguyên
        const numbers = [15, 26, 7, 42, 9, 61, 33, 85, 10, 50];

        // 2. Biến để lưu trữ giá trị lớn nhất và tổng
        let maxValue = numbers[0];
        let sum = 0;

        // 3. Duyệt mảng một lần duy nhất để tìm Max và tính Tổng
        for (let i = 0; i < numbers.length; i++) {
            // Tìm giá trị lớn nhất
            if (numbers[i] > maxValue) {
                maxValue = numbers[i];
            }

            // Cộng dồn vào tổng
            sum += numbers[i];
        }

        // 4. Tính giá trị trung bình
        const average = sum / numbers.length;

        // 5. Hiển thị kết quả
        document.write("Mảng số nguyên:", numbers);
        document.write("<br> ----------------------------");
        document.write(" <br> Giá trị lớn nhất trong mảng là: ", maxValue);
        document.write(" <br> Giá trị trung bình của mảng là: ", average);
    </script>
</body>

</html>
