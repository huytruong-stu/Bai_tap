<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let numbers = [-5, 12, -3, 0, 7, -1, 22, -10, 8, -4];

        // Lọc các phần tử nhỏ hơn 0 và đếm
        let negativeCount = numbers.filter(n => n < 0).length;

        document.write(`Có ${negativeCount} số nguyên âm trong mảng.`);
    </script>
</body>

</html>
