<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let input = prompt("Nhập vào các số nguyên, cách nhau bởi dấu phẩy:");
        let arr = input.split(",").map(Number);
        arr.reverse();
        alert("Mảng sau khi đảo ngược là: " + arr.join(", "));
    </script>
</body>

</html>
