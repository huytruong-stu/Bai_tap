<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let numbers = [34, 7, 23, 56, 1, 99, 45, 12, 8, 10];
        numbers.sort(function (a, b) {
            return b - a;
        });
        document.write("Mảng sau khi sắp xếp giảm dần:");
        document.write("<br>",  numbers);
    </script>
</body>

</html>
