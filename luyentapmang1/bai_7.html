<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let numbers = [10, 25, 3, 47, 56, 12, 8, 99, 31, 20];
        let V = 47;
        let indexV = numbers.indexOf(V);
        if (indexV !== -1) {
            numbers.splice(indexV, 1); 
            numbers.push(0);
            console.log("Mảng sau khi xóa:", numbers);
        } else {
            console.log("V is not in the array");
        }
    </script>
</body>

</html>
