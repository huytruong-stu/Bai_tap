<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" name="weight" id="weight" placeholder="Nhập số cân nặng (kg)">
    <input type="text" name="height" id="height" placeholder="Nhập chiều cao (m)">
    <button onclick="calculateBMI()">Tính BMI</button>
    <p id="result"></p>
    <script>
        function calculateBMI() {
            var weight = parseFloat(document.getElementById('weight').value);
            var height = parseFloat(document.getElementById('height').value);
            var bmi = weight / (height * height);
            if (bmi < 18.5) {
                document.write("Underweight");
            } else if (bmi < 25.0) {
                document.write("Normal weight");
            } else if (bmi < 30.0) {
                document.write("Overweight");
            } else {
                document.write("Obesity");
            }
        }
    </script>
</body>
</html>
